name: Deploy EchoNote

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: echonote-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Tencent Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      NODE_VERSION: "20"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://echo_note_ci_user:ci-placeholder@127.0.0.1:5432/echo_note_ci?schema=public"
      APP_PASSWORD: "ci-placeholder"
      SESSION_SECRET: "ci-placeholder-session-secret"
      CAPTURE_TOKEN: "ci-placeholder-capture-token"
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Generate Prisma client
        shell: bash
        run: npm run db:generate

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Build container image for PR
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker build --pull -t echonote:ci .

      - name: Validate deployment secrets
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          TCR_REGISTRY: ${{ secrets.TCR_REGISTRY }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
          TCR_IMAGE: ${{ secrets.TCR_IMAGE }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$TCR_REGISTRY"
          test -n "$TCR_NAMESPACE"
          test -n "$TCR_IMAGE"
          test -n "$TCR_USERNAME"
          test -n "$TCR_PASSWORD"
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"

      - name: Set image tags
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          TCR_REGISTRY: ${{ secrets.TCR_REGISTRY }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
          TCR_IMAGE: ${{ secrets.TCR_IMAGE }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_base="$TCR_REGISTRY/$TCR_NAMESPACE/$TCR_IMAGE"
          echo "IMAGE_SHA=$image_base:sha-$short_sha" >> "$GITHUB_ENV"
          echo "IMAGE_MAIN=$image_base:main" >> "$GITHUB_ENV"

      - name: Build and push container image
        if: github.event_name != 'pull_request'
        shell: bash
        timeout-minutes: 35
        env:
          TCR_REGISTRY: ${{ secrets.TCR_REGISTRY }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
        run: |
          echo "$TCR_PASSWORD" | docker login "$TCR_REGISTRY" -u "$TCR_USERNAME" --password-stdin
          docker build --pull -t "$IMAGE_SHA" -t "$IMAGE_MAIN" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_MAIN"

      - name: Configure SSH
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/echonote_deploy_key
          chmod 600 ~/.ssh/echonote_deploy_key
          ssh-keyscan -T 10 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        if: github.event_name != 'pull_request'
        shell: bash
        timeout-minutes: 3
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh \
            -i ~/.ssh/echonote_deploy_key \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p /opt/echonote-container"

          scp \
            -i ~/.ssh/echonote_deploy_key \
            -P "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            docker-compose.prod.yml \
            scripts/deploy-container.sh \
            "$SERVER_USER@$SERVER_HOST:/opt/echonote-container/"

          ssh \
            -i ~/.ssh/echonote_deploy_key \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "$SERVER_USER@$SERVER_HOST" \
            "chmod +x /opt/echonote-container/deploy-container.sh"

      - name: Log in to Tencent Cloud registry on server
        if: github.event_name != 'pull_request'
        shell: bash
        timeout-minutes: 3
        env:
          TCR_REGISTRY: ${{ secrets.TCR_REGISTRY }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "$TCR_PASSWORD" | ssh \
            -i ~/.ssh/echonote_deploy_key \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "$SERVER_USER@$SERVER_HOST" \
            "docker login '$TCR_REGISTRY' -u '$TCR_USERNAME' --password-stdin"

      - name: Deploy container release
        if: github.event_name != 'pull_request'
        shell: bash
        timeout-minutes: 20
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh \
            -i ~/.ssh/echonote_deploy_key \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            "$SERVER_USER@$SERVER_HOST" \
            "ECHONOTE_IMAGE='$IMAGE_SHA' /opt/echonote-container/deploy-container.sh '$IMAGE_SHA'"
