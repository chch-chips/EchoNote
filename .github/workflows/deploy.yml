name: Deploy EchoNote

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: echonote-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Tencent Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      NODE_VERSION: "20"
      RELEASE_ID: ${{ github.sha }}
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://echo_note_ci_user:ci-placeholder@127.0.0.1:5432/echo_note_ci?schema=public"
      APP_PASSWORD: "ci-placeholder"
      SESSION_SECRET: "ci-placeholder-session-secret"
      CAPTURE_TOKEN: "ci-placeholder-capture-token"
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Validate required secrets
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Generate Prisma client
        shell: bash
        run: npm run db:generate

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Build
        shell: bash
        run: npm run build

      - name: Summarize release payload
        shell: bash
        run: |
          du -sh \
            .next/standalone \
            .next/static \
            public \
            prisma \
            scripts \
            src \
            package.json \
            package-lock.json \
            prisma.config.ts \
            next.config.ts \
            postcss.config.mjs \
            tsconfig.json \
            README.md \
            AGENTS.md \
            docs

      - name: Configure SSH
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/echonote_deploy_key
          chmod 600 ~/.ssh/echonote_deploy_key
          ssh-keyscan -T 10 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload release files
        shell: bash
        timeout-minutes: 20
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          case "$RELEASE_ID" in
            ""|*/*|*..*)
              echo "invalid release id: $RELEASE_ID"
              exit 1
              ;;
          esac

          ssh_opts=(
            -i ~/.ssh/echonote_deploy_key
            -p "$SERVER_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=6
          )
          remote_release="/opt/echonote/releases/$RELEASE_ID"

          if ssh "${ssh_opts[@]}" "$SERVER_USER@$SERVER_HOST" \
            "[ \"\$(readlink -f /opt/echonote/current 2>/dev/null || true)\" = '$remote_release' ]"; then
            echo "Release $RELEASE_ID is already active; refreshing services in activate step."
            exit 0
          fi

          ssh "${ssh_opts[@]}" "$SERVER_USER@$SERVER_HOST" \
            "rm -rf '$remote_release' && mkdir -p '$remote_release'"

          link_dest=()
          if ssh "${ssh_opts[@]}" "$SERVER_USER@$SERVER_HOST" "test -d /opt/echonote/current"; then
            link_dest=(--link-dest=/opt/echonote/current)
          fi

          rsync -azR --human-readable --partial --info=stats2,progress2 \
            "${link_dest[@]}" \
            -e "ssh -i ~/.ssh/echonote_deploy_key -p $SERVER_PORT -o BatchMode=yes -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=6" \
            ./.next/standalone \
            ./.next/static \
            ./public \
            ./prisma \
            ./scripts \
            ./src \
            ./package.json \
            ./package-lock.json \
            ./prisma.config.ts \
            ./next.config.ts \
            ./postcss.config.mjs \
            ./tsconfig.json \
            ./README.md \
            ./AGENTS.md \
            ./docs \
            "$SERVER_USER@$SERVER_HOST:$remote_release/"

      - name: Activate release
        shell: bash
        timeout-minutes: 20
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh \
            -i ~/.ssh/echonote_deploy_key \
            -p "$SERVER_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            "$SERVER_USER@$SERVER_HOST" \
            "RELEASE_ID='$RELEASE_ID' bash -s" <<'REMOTE'
          set -euo pipefail
          case "$RELEASE_ID" in
            ""|*/*|*..*)
              echo "invalid release id: $RELEASE_ID"
              exit 1
              ;;
          esac
          release_dir="/opt/echonote/releases/$RELEASE_ID"
          bash "$release_dir/scripts/install-release.sh" "$RELEASE_ID"
          REMOTE
